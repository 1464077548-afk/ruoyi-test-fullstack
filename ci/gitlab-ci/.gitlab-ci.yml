image: docker:latest

services:
  - docker:dind

stages:
  - build_backend
  - build_frontend
  - build_docker
  - test_smoke
  - test_api
  - test_ui
  - test_integration
  - test_performance
  - test_security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  MAVEN_OPTS: "-Dmaven.test.skip=true"
  BUILD_DIR: "${CI_PROJECT_DIR}"
  TEST_REPORTS_DIR: "${CI_PROJECT_DIR}/reports"

before_script:
  - docker info
  - docker-compose --version
  - apk add --no-cache openjdk17 maven nodejs npm curl

build_backend:
  stage: build_backend
  script:
    - cd ../RuoYi-Vue
    - mvn clean package -DskipTests -q
  artifacts:
    paths:
      - ../RuoYi-Vue/ruoyi-admin/target/ruoyi-admin.jar
    expire_in: 1 week

build_frontend:
  stage: build_frontend
  script:
    - cd ../RuoYi-Vue/ruoyi-ui
    - npm install --production
    - npm run build:prod
  artifacts:
    paths:
      - ../RuoYi-Vue/ruoyi-ui/dist/
    expire_in: 1 week

build_docker:
  stage: build_docker
  script:
    - docker-compose build
  dependencies:
    - build_backend
    - build_frontend

test_smoke:
  stage: test_smoke
  script:
    - docker-compose up -d
    - sleep 180
    - docker exec ruoyi-test-runner pytest -m smoke -v --tb=short --html=reports/html/smoke_report.html --self-contained-html
  artifacts:
    paths:
      - reports/html/smoke_report.html
    expire_in: 1 week
  retry: 1

test_api:
  stage: test_api
  script:
    - docker exec ruoyi-test-runner pytest -m api -v --tb=short --html=reports/html/api_report.html --self-contained-html -n auto
  artifacts:
    paths:
      - reports/html/api_report.html
    expire_in: 1 week
  retry: 1

test_ui:
  stage: test_ui
  script:
    - docker exec ruoyi-test-runner pytest -m ui -v --tb=short --html=reports/html/ui_report.html --self-contained-html -n auto
  artifacts:
    paths:
      - reports/html/ui_report.html
    expire_in: 1 week
  retry: 1

test_integration:
  stage: test_integration
  script:
    - docker exec ruoyi-test-runner pytest -m integration -v --tb=short --html=reports/html/integration_report.html --self-contained-html
  artifacts:
    paths:
      - reports/html/integration_report.html
    expire_in: 1 week
  retry: 1

test_performance:
  stage: test_performance
  script:
    - docker exec ruoyi-test-runner pytest -m performance -v --tb=short --html=reports/html/performance_report.html --self-contained-html
  artifacts:
    paths:
      - reports/html/performance_report.html
    expire_in: 1 week
  retry: 1

test_security:
  stage: test_security
  script:
    - docker exec ruoyi-test-runner pytest -m security -v --tb=short --html=reports/html/security_report.html --self-contained-html
  artifacts:
    paths:
      - reports/html/security_report.html
    expire_in: 1 week
  retry: 1

deploy:
  stage: deploy
  script:
    - echo "Deploying test results..."
    - ls -la reports/
    - docker-compose down
  artifacts:
    paths:
      - reports/
    expire_in: 1 week
  only:
    - main

schedules:
  - cron: "0 0 * * *"
    ref: main
    variables:
      RUN_NIGHTLY_TESTS: "true"