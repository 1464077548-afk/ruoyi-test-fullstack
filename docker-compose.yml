services:
  mysql:
    image: mysql:8.0
    container_name: ruoyi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-ry-vue}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    command: ["--default-time-zone=+08:00"]
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./RuoYi-Vue/sql/ry_20260417.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./RuoYi-Vue/sql/quartz.sql:/docker-entrypoint-initdb.d/02_quartz.sql
      - ./config/my.cnf:/etc/mysql/conf.d/my.cnf
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7.0
    container_name: ruoyi-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ruoyi-admin:
    build:
      context: .
      dockerfile: config/Dockerfile.ruoyi-admin
    container_name: ruoyi-admin
    working_dir: /app
    environment:
      - SPRING_DATASOURCE_DRUID_MASTER_URL=jdbc:mysql://mysql:3306/ry-vue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
      - SPRING_DATASOURCE_DRUID_MASTER_USERNAME=root
      - SPRING_DATASOURCE_DRUID_MASTER_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_DATABASE=0
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8
    volumes:
      - ./RuoYi-Vue/ruoyi-admin/target/ruoyi-admin.jar:/app/ruoyi-admin.jar
      - ruoyi-logs:/app/logs
    ports:
      - "${ADMIN_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    command: java -Dfile.encoding=UTF-8 -Dsun.jnu.encoding=UTF-8 -jar ruoyi-admin.jar
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ | grep -q '200' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  ruoyi-ui:
    image: nginx:alpine
    container_name: ruoyi-ui
    volumes:
      - ./RuoYi-Vue/ruoyi-ui/dist:/usr/share/nginx/html
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      - ruoyi-admin
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruoyi-test-runner
    working_dir: /app
    environment:
      - BASE_URL=http://ruoyi-ui:80
      - API_BASE_URL=http://ruoyi-admin:8080
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3307}
      - DB_NAME=${DB_NAME:-ry-vue}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - BROWSER=${BROWSER:-chromium}
      - HEADLESS=${HEADLESS:-true}
      - TEST_USERNAME=${TEST_USERNAME:-admin}
      - TEST_PASSWORD=${TEST_PASSWORD:-admin123}
    volumes:
      - .:/app
      - test-reports:/app/reports
    depends_on:
      ruoyi-admin:
        condition: service_healthy
      ruoyi-ui:
        condition: service_healthy
    restart: always
    command: tail -f /dev/null

volumes:
  mysql-data:
  redis-data:
  ruoyi-logs:
  test-reports:
