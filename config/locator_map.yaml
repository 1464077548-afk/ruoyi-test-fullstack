# UI 元素定位配置

locators:
#===============================================公共元素 ===================================
  common:
  #=====系统弹窗元素定位器==================
    operate_message:
      strategy: role
      value: alert
      chain:
        - method: first
      description: 操作提示消息
    more_button: 
      strategy: role
      value: button
      options:
        name: "更多"
      description: 更多操作按钮
    table_list: ".el-table__body tbody"
  #-----------------------系统提示弹窗------------------
    sys_prompt:
      strategy: role
      value: dialog
      options:
        name: "提示"
      description: 系统提示弹窗
    sys_prompt_confirm:
      strategy: role
      value: button
      options:
        name: "确定"
      description: 系统提示弹窗确认按钮
    sys_prompt_cancel:
      strategy: role
      value: button
      options:
        name: "取消"
      description: 系统提示弹窗取消按钮
    user_login_prompt:
      strategy: role
      value: dialog
      options:
        name: "安全提示"
      description: 用户登录提示弹窗
    user_login_prompt_cancel:
      strategy: role
      value: button
      options:
        name: "取消"
      description: 用户登录提示弹窗取消按钮
  #-------------------------表单验证错误提示------------------
    form_item_error:
      strategy: css
      value: ".el-form-item__error"
      description: 表单字段错误提示
    loading_mask:
      strategy: css
      value: ".loading-mask"
      description: 加载遮罩层
  #-------------------------操作区域按钮元素定位---------------
    add_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "新增"}
        - method: first
      description: 新增按钮
    modify_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "修改"}
        - method: first
      description: 修改按钮
    batch_delete_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "删除"}
        - method: first
      description: 批量删除按钮
    import_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "导入"}
        - method: first
      description: 导入按钮
    export_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "导出"}
        - method: first
      description: 导出按钮
    #-------------------------搜索区域公共元素------------------
    search_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "搜索"}
        - method: first
      description: 搜索按钮 
    search_reset_button: 
      strategy: css
      value: "#app"
      chain:
        - method: get_by_role
          args: ["button"]
          kwargs: {"name": "重置"}
        - method: first
      description: 搜索重置按钮
    #------------------------表单区域公共元素定位-----------------
    save_button: 
      strategy: role
      value: button
      options:
        name: "确 定"
      description: 保存按钮
    cancel_button: 
      strategy: role
      value: button
      options:
        name: "取 消"
      description: 取消按钮
    
    switch_tab:
      strategy: css
      value: "#tags-view-container"
      chain:
        - method: get_by_text
          args: ["{{tab_name}}"]
        - method: first
      description: 切换tab页
    close_tab: 
      strategy: css
      value: ".tags-view-item.router-link-exact-active > .el-icon-close"
      description: 关闭当前tab页

# ================================================ 登录模块 ====================================
  login:
    username_input:
      strategy: get_by_placeholder
      value: "账号" 
    
    password_input:
      strategy: get_by_placeholder
      value: "密码"

    captcha_input:
      strategy: get_by_placeholder
      value: "验证码"
      description: 验证码输入框
    captcha_image:
      strategy: css
      value: ".login-code-img, img[src*='data:image'], .captcha-img"
      description: 验证码图片
    remember_me:
      strategy: css
      value: ".el-checkbox"
      description: 记住密码复选框
    
    submit_button:
      strategy: get_by_text
      value: "登 录"
      options:
        exact: True
      description: 登录按钮
         
    error_message:
      strategy: css
      value: ".el-message--error, .el-alert--error, [class*='error']"
      description: 登录错误提示
    #退出登录元素定位器
    user_info:
      strategy: css
      value: ".user-nickname"
      description: 用户信息按钮
    
    logout_button:
      strategy: css
      value: ".el-dropdown-menu__item"
      chain:
        - method: filter
          kwargs: {"has_text": "退出登录"}
      description: 退出登录按钮

# ================================================ 首页模块 ====================================
  home:
    #退出登录元素定位器
    user_info:
      strategy: css
      value: ".user-nickname"
      description: 用户信息按钮
    logout_button:
      strategy: css
      value: ".el-dropdown-menu__item"
      chain:
        - method: filter
          kwargs: {"has_text": "退出登录"}
      description: 退出登录按钮
    menu_list:
      strategy: role
      value: menuitem
      
    menu:
      strategy: css
      value: ".sidebar-container"
      description: 左侧菜单容器
    user_management:
      strategy: css
      value: ".sidebar-container"
      chain:
        - method: get_by_text
          args: ["用户管理"]
      description: 用户管理菜单

