      chain:
        - method: get_by_placeholder
          args: ["请输入部门名称"]
      description: 部门名称输入框
    edit_dept_sort: 
      strategy: role
      value: dialog
      options:
        name: "修改部门"
      chain:
        - method: get_by_role
