# Font configuration for Java on Alpine Linux
# This file tells Java where to find fonts

sequence.allfonts=default
sequence.serif=default
sequence.sansserif=default
sequence.monospaced=default

allfonts.dejavu=DejaVu Sans
serif.dejavu=DejaVu Serif
sansserif.dejavu=DejaVu Sans
monospaced.dejavu=DejaVu Sans Mono

filename.dejavu=/usr/share/fonts/dejavu/DejaVuSans.ttf
filename.dejavu.bold=/usr/share/fonts/dejavu/DejaVuSans-Bold.ttf
filename.dejavu.italic=/usr/share/fonts/dejavu/DejaVuSans-Oblique.ttf
filename.dejavu.bolditalic=/usr/share/fonts/dejavu/DejaVuSans-BoldOblique.ttf

filename.DejaVu_Serif=/usr/share/fonts/dejavu/DejaVuSerif.ttf
filename.DejaVu_Serif_Bold=/usr/share/fonts/dejavu/DejaVuSerif-Bold.ttf
filename.DejaVu_Serif_Italic=/usr/share/fonts/dejavu/DejaVuSerif-Italic.ttf
filename.DejaVu_Serif_Bold_Italic=/usr/share/fonts/dejavu/DejaVuSerif-BoldItalic.ttf

filename.DejaVu_Sans_Mono=/usr/share/fonts/dejavu/DejaVuSansMono.ttf
filename.DejaVu_Sans_Mono_Bold=/usr/share/fonts/dejavu/DejaVuSansMono-Bold.ttf