[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v 
    --tb=short
    --html=reports/html/report.html
    --self-contained-html
    --junitxml=reports/junit/junit.xml
    --alluredir=reports/allure
    --reruns 3 --reruns-delay 1


# 测试标记
markers =
# 测试级别
    l1: Level 1 - 单接口/组件测试
    l2: Level 2 - 模块测试
    l3: Level 3 - 业务流测试
    l4: Level 4 - 探索性测试
    
# 测试类型
    api: 接口测试
    ui: UI 测试
    integration: 集成测试
    performance: 性能测试
    security: 安全测试
    
# 测试场景
    smoke: 冒烟测试
    regression: 回归测试
    e2e: 端到端测试
    exploratory: 探索式测试
    explore: 探索式测试
    chaos: 混沌测试
    usability: 可用性测试
    accessibility: 无障碍测试
    
# 优先级
    p0: P0 优先级
    p1: P1 优先级
    p2: P2 优先级
    p3: P3 优先级
    
# 性能类型
    stress: 压力测试
    load: 负载测试
    endurance: 稳定性测试
    
    serial: 串行执行用例
    
# 组件和模块标记
    component: 组件测试
    module: 模块测试

# 日志
log_cli = true
log_cli_level = INFO
